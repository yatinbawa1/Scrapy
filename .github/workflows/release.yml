name: Build & Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-macos:
    name: Build macOS (Apple Silicon)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.13.0

      - name: Build
        run: |
          cd wallpaper-chooser
          wails build

      - name: Package
        run: |
          cd wallpaper-chooser/build/bin
          ditto -c -k -r wallpaper-chooser.app wallpaper-chooser-macos.zip

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: wallpaper-chooser/build/bin/wallpaper-chooser-macos.zip

  build-windows:
    name: Build Windows (amd64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install MinGW (gcc for CGO)
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: mingw-w64-x86_64-gcc

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.13.0

      - name: Build
        run: |
          cd wallpaper-chooser
          $env:PATH = "C:\msys64\mingw64\bin;" + $env:PATH
          wails build

      - name: Package
        run: |
          cd wallpaper-chooser/build/bin
          Compress-Archive -Path wallpaper-chooser.exe -DestinationPath wallpaper-chooser-windows.zip

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: wallpaper-chooser/build/bin/wallpaper-chooser-windows.zip

  build-linux:
    name: Build Linux (amd64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            pkg-config \
            gcc

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.13.0

      - name: Build
        run: |
          cd wallpaper-chooser
          wails build

      - name: Package
        run: |
          cd wallpaper-chooser/build/bin
          zip wallpaper-chooser-linux.zip wallpaper-chooser

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: wallpaper-chooser/build/bin/wallpaper-chooser-linux.zip
